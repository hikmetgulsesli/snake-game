<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Main Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1f;
      --bg-card: #232329;
      --border: #2e2e36;
      --text-primary: #f5f5f7;
      --text-secondary: #a0a0a8;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --danger: #ef4444;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      letter-spacing: 4px;
    }
    
    .score-board {
      display: flex;
      gap: 48px;
      margin-top: 16px;
    }
    
    .score-item {
      text-align: center;
    }
    
    .score-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .score-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .difficulty-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--bg-card);
      padding: 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    
    .difficulty-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .difficulty-btn:hover {
      color: var(--text-primary);
    }
    
    .difficulty-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    
    .game-container {
      position: relative;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .game-board {
      width: 400px;
      height: 400px;
      background: var(--bg-primary);
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(20, 1fr);
      gap: 1px;
      position: relative;
    }
    
    .cell {
      background: #151519;
      border-radius: 1px;
    }
    
    .snake {
      background: var(--accent);
      border-radius: 3px;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    
    .snake-head {
      background: #4ade80;
      border-radius: 4px;
    }
    
    .food {
      background: var(--danger);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    
    .controls {
      margin-top: 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .controls-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="logo">SNAKE</h1>
    <div class="score-board">
      <div class="score-item">
        <div class="score-label">Score</div>
        <div class="score-value">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">High Score</div>
        <div class="score-value">0</div>
      </div>
    </div>
  </div>
  
  <div class="difficulty-selector">
    <button class="difficulty-btn">Easy</button>
    <button class="difficulty-btn active">Medium</button>
    <button class="difficulty-btn">Expert</button>
  </div>
  
  <div class="game-container">
    <div class="game-board">
      <!-- Snake body -->
      <div class="cell snake-head" style="grid-column: 8; grid-row: 10;"></div>
      <div class="cell snake" style="grid-column: 7; grid-row: 10;"></div>
      <div class="cell snake" style="grid-column: 6; grid-row: 10;"></div>
      <div class="cell snake" style="grid-column: 5; grid-row: 10;"></div>
      
      <!-- Food -->
      <div class="cell food" style="grid-column: 15; grid-row: 6;"></div>
    </div>
  </div>
  
  <div class="controls">
    <span class="controls-key">↑</span>
    <span class="controls-key">↓</span>
    <span class="controls-key">←</span>
    <span class="controls-key">→</span> or 
    <span class="controls-key">W</span>
    <span class="controls-key">A</span>
    <span class="controls-key">S</span>
    <span class="controls-key">D</span> to move · 
    <span class="controls-key">Space</span> to pause
  </div>
</body>
</html>
