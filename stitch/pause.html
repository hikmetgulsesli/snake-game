<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Pause</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1f;
      --bg-card: #232329;
      --border: #2e2e36;
      --text-primary: #f5f5f7;
      --text-secondary: #a0a0a8;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --warning: #f59e0b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 18, 0.85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
      min-width: 320px;
    }
    
    .pause-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border: 3px solid var(--warning);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .pause-icon::before,
    .pause-icon::after {
      content: '';
      width: 6px;
      height: 24px;
      background: var(--warning);
      border-radius: 2px;
      margin: 0 3px;
    }
    
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--warning);
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    
    .current-score {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 20px 40px;
      margin-bottom: 32px;
    }
    
    .score-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .score-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 40px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .btn {
      width: 100%;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
      box-shadow: 0 4px 16px var(--accent-glow);
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }
    
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .hint-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 20px;
      padding: 0 6px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-primary);
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="modal-overlay">
    <div class="modal">
      <div class="pause-icon"></div>
      <h1 class="title">PAUSED</h1>
      <p class="subtitle">Game is paused</p>
      
      <div class="current-score">
        <div class="score-label">Current Score</div>
        <div class="score-value">18</div>
      </div>
      
      <button class="btn btn-primary">Resume Game</button>
      <button class="btn btn-secondary">Quit to Menu</button>
      
      <p class="hint">Press <span class="hint-key">Space</span> to resume</p>
    </div>
  </div>
</body>
</html>
