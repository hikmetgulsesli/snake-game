<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snake Game Gameplay Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#0f172a",
                        "surface": "#1e293b",
                        "surface-light": "#334155"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1 w-full">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-surface px-4 md:px-10 py-4 mb-6">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-3xl">sports_esports</span>
<h2 class="text-slate-900 dark:text-white text-xl md:text-2xl font-bold leading-tight tracking-[-0.015em]">Snake Game</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="bg-surface-light bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 shadow-sm" data-alt="User avatar image" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCumu3kH1VZD1J6lI_UUjBMlZXsg94q0FTbIwS_P3YMaUxFTx9qfLC51gtjGL0AkkTClFSdZ2h590R6t07bQEXmofJ11EtndTOGgSjE2o_7LXFXojSHVTfnXOSV-81kMWHKPeFr6krqH8s5WZ58Ar8kMrrV37yW9V_CiReDeJH_rGgfdQi5sdojwQacDA1yTOrKTrDX675Cg9HY56osC_-4sQsMP9c9TWDzEguXXEZF3Iv10SZDncrYvGeOHF9Qu7h4cTad7S84-ATy");'></div>
</div>
</header>
<div class="flex flex-wrap gap-4 px-4 py-3 mb-4">
<div class="flex min-w-[140px] flex-1 basis-[fit-content] flex-col gap-2 rounded-xl bg-surface border border-surface-light p-4 items-center text-center shadow-lg">
<p class="text-primary tracking-light text-3xl font-bold leading-tight">150</p>
<div class="flex items-center gap-2"><p class="text-slate-400 font-body text-sm font-medium uppercase tracking-wider">Score</p></div>
</div>
<div class="flex min-w-[140px] flex-1 basis-[fit-content] flex-col gap-2 rounded-xl bg-surface border border-surface-light p-4 items-center text-center shadow-lg">
<p class="text-slate-100 tracking-light text-3xl font-bold leading-tight">1200</p>
<div class="flex items-center gap-2"><p class="text-slate-400 font-body text-sm font-medium uppercase tracking-wider">High Score</p></div>
</div>
</div>
<div class="flex px-4 py-3 mb-6 justify-center">
<div class="flex h-12 w-full max-w-md items-center justify-center rounded-full bg-surface p-1 shadow-md border border-surface-light">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all duration-200 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_10px_rgba(34,197,94,0.3)] has-[:checked]:text-white text-slate-400 text-sm font-bold tracking-wide uppercase">
<span class="truncate">Easy</span>
<input class="invisible w-0" name="difficulty" type="radio" value="Easy"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all duration-200 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_10px_rgba(34,197,94,0.3)] has-[:checked]:text-white text-slate-400 text-sm font-bold tracking-wide uppercase">
<span class="truncate">Medium</span>
<input checked="" class="invisible w-0" name="difficulty" type="radio" value="Medium"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all duration-200 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_10px_rgba(34,197,94,0.3)] has-[:checked]:text-white text-slate-400 text-sm font-bold tracking-wide uppercase">
<span class="truncate">Expert</span>
<input class="invisible w-0" name="difficulty" type="radio" value="Expert"/>
</label>
</div>
</div>
<div class="flex px-4 py-3 mb-6 justify-center">
<div class="w-full max-w-3xl aspect-[4/3] bg-[#1e293b] rounded-2xl shadow-2xl border-2 border-surface-light relative overflow-hidden flex flex-col">
<div class="absolute inset-0 grid grid-cols-[repeat(20,minmax(0,1fr))] grid-rows-[repeat(15,minmax(0,1fr))] opacity-20 pointer-events-none">
<style>
                                    .grid-cell { border: 1px solid #334155; }
                                </style>
<script>
                                    for(let i=0; i<300; i++) document.write('<div class="grid-cell"></div>');
                                </script>
</div>
<div class="absolute top-[40%] left-[30%] w-[5%] h-[6.66%] bg-primary rounded-sm shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
<div class="absolute top-[40%] left-[25%] w-[5%] h-[6.66%] bg-primary/80 rounded-sm"></div>
<div class="absolute top-[40%] left-[20%] w-[5%] h-[6.66%] bg-primary/60 rounded-sm"></div>
<div class="absolute top-[46.66%] left-[20%] w-[5%] h-[6.66%] bg-primary/40 rounded-sm"></div>
<div class="absolute top-[60%] left-[70%] w-[5%] h-[6.66%] bg-red-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-pulse"></div>
<div class="absolute top-4 left-4 right-4 flex justify-between z-10">
<span class="text-white/50 font-display text-sm">Score: 150</span>
<span class="text-white/50 font-display text-sm">Speed: 1.2x</span>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row items-center gap-4 bg-surface rounded-xl p-4 shadow-md border border-surface-light mx-4 font-body">
<div class="flex items-center gap-3 flex-1 w-full">
<div class="text-primary flex items-center justify-center rounded-lg bg-surface-light shrink-0 size-12 shadow-inner">
<span class="material-symbols-outlined text-2xl">swipe</span>
</div>
<p class="text-slate-300 text-sm sm:text-base font-medium leading-normal flex-1">Movement controls</p>
</div>
<div class="flex items-center gap-3 shrink-0">
<div class="flex gap-1">
<kbd class="px-2 py-1 bg-surface-light border border-slate-600 rounded text-xs text-slate-300 font-sans">W</kbd>
<kbd class="px-2 py-1 bg-surface-light border border-slate-600 rounded text-xs text-slate-300 font-sans">A</kbd>
<kbd class="px-2 py-1 bg-surface-light border border-slate-600 rounded text-xs text-slate-300 font-sans">S</kbd>
<kbd class="px-2 py-1 bg-surface-light border border-slate-600 rounded text-xs text-slate-300 font-sans">D</kbd>
</div>
<span class="text-slate-500 text-sm">or</span>
<div class="flex gap-1">
<span class="material-symbols-outlined text-slate-400 bg-surface-light border border-slate-600 rounded p-0.5 text-sm">arrow_upward</span>
<span class="material-symbols-outlined text-slate-400 bg-surface-light border border-slate-600 rounded p-0.5 text-sm">arrow_downward</span>
<span class="material-symbols-outlined text-slate-400 bg-surface-light border border-slate-600 rounded p-0.5 text-sm">arrow_back</span>
<span class="material-symbols-outlined text-slate-400 bg-surface-light border border-slate-600 rounded p-0.5 text-sm">arrow_forward</span>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row items-center gap-4 bg-surface rounded-xl p-4 shadow-md border border-surface-light mx-4 mt-4 font-body">
<div class="flex items-center gap-3 flex-1 w-full">
<div class="text-primary flex items-center justify-center rounded-lg bg-surface-light shrink-0 size-12 shadow-inner">
<span class="material-symbols-outlined text-2xl">pause</span>
</div>
<p class="text-slate-300 text-sm sm:text-base font-medium leading-normal flex-1">Pause Game</p>
</div>
<div class="flex items-center gap-3 shrink-0">
<kbd class="px-6 py-1 bg-surface-light border border-slate-600 rounded text-xs text-slate-300 font-sans tracking-wider">SPACE</kbd>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
