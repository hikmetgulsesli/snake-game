<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snake Game Over Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                        "surface-dark": "#1a2e22",
                        "surface-darker": "#15261c",
                        "border-dark": "#2a4a36"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen relative overflow-hidden flex flex-col">
<!-- Blurred Gameplay Background Simulation -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, rgba(34, 197, 94, 0.4) 1px, transparent 0); background-size: 40px 40px; filter: blur(4px);"></div>
<!-- Top Navigation (simplified for game over screen context, usually hidden or minimal) -->
<header class="relative z-10 flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark px-10 py-4 bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center gap-4 text-white">
<span class="material-symbols-outlined text-primary text-2xl">pest_control</span>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">Snake Game</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-surface-dark text-slate-300 hover:text-white transition-colors border border-border-dark">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 flex items-center justify-center p-6">
<!-- Floating Card UI -->
<div class="w-full max-w-[600px] bg-surface-dark border border-border-dark rounded-xl shadow-2xl overflow-hidden flex flex-col items-center py-10 px-8 relative">
<!-- Glow Effect Behind Card Content -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/10 rounded-full blur-[80px] pointer-events-none"></div>
<h1 class="text-white tracking-tight text-[48px] font-bold leading-tight text-center pb-8 z-10 drop-shadow-[0_0_15px_rgba(34,197,94,0.3)]">Game Over!</h1>
<!-- Score Cards -->
<div class="flex flex-wrap w-full gap-6 pb-10 z-10">
<div class="flex flex-1 flex-col items-center justify-center gap-2 rounded-xl p-8 bg-surface-darker border border-border-dark shadow-inner relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<p class="text-slate-400 text-sm font-medium uppercase tracking-wider">Final Score</p>
<p class="text-primary tracking-tight text-5xl font-bold leading-tight drop-shadow-[0_0_10px_rgba(34,197,94,0.5)]">1,250</p>
</div>
<div class="flex flex-1 flex-col items-center justify-center gap-2 rounded-xl p-8 bg-surface-darker border border-border-dark shadow-inner relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-amber-400 text-[18px]">trophy</span>
<p class="text-slate-400 text-sm font-medium uppercase tracking-wider">Personal Best</p>
</div>
<p class="text-white tracking-tight text-4xl font-bold leading-tight">1,400</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex w-full gap-4 pb-12 z-10 justify-center">
<button class="flex items-center justify-center gap-3 rounded-full h-14 px-8 bg-primary hover:bg-primary/90 text-background-dark text-lg font-bold leading-normal tracking-wide transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)] hover:shadow-[0_0_30px_rgba(34,197,94,0.5)] min-w-[200px]">
<span class="material-symbols-outlined text-[24px]">replay</span>
<span>Play Again</span>
</button>
<button class="flex items-center justify-center gap-3 rounded-full h-14 px-8 bg-transparent border-2 border-border-dark hover:border-slate-500 text-white text-lg font-bold leading-normal tracking-wide transition-colors min-w-[200px]">
<span class="material-symbols-outlined text-[24px]">home</span>
<span>Main Menu</span>
</button>
</div>
<!-- Leaderboard Section -->
<div class="w-full border-t border-border-dark pt-8 z-10">
<h2 class="text-slate-300 text-sm font-bold uppercase tracking-widest text-center pb-6 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">leaderboard</span>
                    Top 3 High Scores
                </h2>
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center bg-surface-darker rounded-lg p-4 border border-border-dark/50">
<div class="flex items-center gap-4">
<span class="text-amber-400 font-bold text-lg w-6 text-center">1</span>
<span class="text-slate-200 font-medium">PlayerOne</span>
</div>
<span class="text-white font-bold">1,400</span>
</div>
<div class="flex justify-between items-center bg-surface-darker rounded-lg p-4 border border-border-dark/50">
<div class="flex items-center gap-4">
<span class="text-slate-400 font-bold text-lg w-6 text-center">2</span>
<span class="text-slate-200 font-medium">SnakeMaster</span>
</div>
<span class="text-white font-bold">1,120</span>
</div>
<div class="flex justify-between items-center bg-surface-darker rounded-lg p-4 border border-border-dark/50 opacity-80">
<div class="flex items-center gap-4">
<span class="text-amber-700 font-bold text-lg w-6 text-center">3</span>
<span class="text-slate-200 font-medium">Guest89</span>
</div>
<span class="text-white font-bold">950</span>
</div>
</div>
</div>
</div>
</main>
</body></html>
