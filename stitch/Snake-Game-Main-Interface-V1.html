<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snake Game Main Interface V1</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21c45d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
        
        .game-grid {
            background-size: 20px 20px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-5 md:py-10">
<div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1 gap-6">
<!-- Stats Header -->
<div class="flex flex-wrap gap-4 p-4">
<div class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-xl p-6 bg-primary/10 border border-primary/20 shadow-sm backdrop-blur-sm">
<p class="text-slate-600 dark:text-slate-300 text-base font-medium leading-normal">Score</p>
<p class="text-primary tracking-tight text-3xl font-bold leading-tight">120</p>
</div>
<div class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-xl p-6 bg-primary/5 border border-primary/10 shadow-sm backdrop-blur-sm">
<p class="text-slate-600 dark:text-slate-300 text-base font-medium leading-normal">High Score</p>
<p class="text-slate-800 dark:text-white tracking-tight text-3xl font-bold leading-tight">450</p>
</div>
</div>
<!-- Difficulty Selector -->
<div class="flex px-4 py-2 justify-center">
<div class="flex h-12 flex-1 max-w-md items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800/50 p-1 border border-slate-300 dark:border-slate-700/50 shadow-inner">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all has-[:checked]:bg-primary has-[:checked]:shadow-md has-[:checked]:text-white text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 text-sm font-bold leading-normal">
<span class="truncate">Easy</span>
<input class="invisible w-0 absolute" name="difficulty" type="radio" value="Easy"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all has-[:checked]:bg-primary has-[:checked]:shadow-md has-[:checked]:text-white text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 text-sm font-bold leading-normal">
<span class="truncate">Medium</span>
<input checked="" class="invisible w-0 absolute" name="difficulty" type="radio" value="Medium"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all has-[:checked]:bg-primary has-[:checked]:shadow-md has-[:checked]:text-white text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 text-sm font-bold leading-normal">
<span class="truncate">Expert</span>
<input class="invisible w-0 absolute" name="difficulty" type="radio" value="Expert"/>
</label>
</div>
</div>
<!-- Game Board Container -->
<div class="flex w-full grow px-4 @container py-2">
<div class="w-full relative overflow-hidden bg-slate-900 rounded-xl border-4 border-slate-800 dark:border-slate-700 shadow-2xl shadow-primary/10 aspect-[4/3] md:aspect-[21/9] flex game-grid">
<!-- Snake -->
<div class="absolute w-[20px] h-[20px] bg-primary rounded-sm shadow-[0_0_10px_rgba(33,196,93,0.8)]" style="top: 100px; left: 200px;"></div>
<div class="absolute w-[20px] h-[20px] bg-primary/80 rounded-sm" style="top: 100px; left: 180px;"></div>
<div class="absolute w-[20px] h-[20px] bg-primary/80 rounded-sm" style="top: 100px; left: 160px;"></div>
<div class="absolute w-[20px] h-[20px] bg-primary/80 rounded-sm" style="top: 120px; left: 160px;"></div>
<div class="absolute w-[20px] h-[20px] bg-primary/80 rounded-sm" style="top: 140px; left: 160px;"></div>
<!-- Food -->
<div class="absolute w-[20px] h-[20px] bg-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)] animate-pulse" style="top: 60px; left: 400px;"></div>
</div>
</div>
<!-- Instructions -->
<div class="grid grid-cols-[repeat(auto-fit,minmax(250px,1fr))] gap-4 p-4">
<div class="flex flex-1 gap-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 p-5 items-center shadow-sm backdrop-blur-sm">
<div class="text-primary bg-primary/10 p-2 rounded flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">gamepad</span>
</div>
<h2 class="text-slate-800 dark:text-slate-200 text-base font-medium leading-tight">Arrow Keys / WASD to move</h2>
</div>
<div class="flex flex-1 gap-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 p-5 items-center shadow-sm backdrop-blur-sm">
<div class="text-primary bg-primary/10 p-2 rounded flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">pause_circle</span>
</div>
<h2 class="text-slate-800 dark:text-slate-200 text-base font-medium leading-tight">Space to Pause</h2>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
