<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Game Over</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1f;
      --bg-card: #232329;
      --border: #2e2e36;
      --text-primary: #f5f5f7;
      --text-secondary: #a0a0a8;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 18, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
      min-width: 360px;
    }
    
    .game-over-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px var(--danger-glow);
    }
    
    .game-over-icon::after {
      content: '✕';
      font-size: 40px;
      color: white;
      font-weight: 700;
    }
    
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 32px;
    }
    
    .final-score {
      margin-bottom: 32px;
    }
    
    .final-score-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .final-score-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 64px;
      font-weight: 700;
      color: var(--text-primary);
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
    }
    
    .high-score-note {
      margin-top: 16px;
      font-size: 14px;
      color: var(--accent);
    }
    
    .btn {
      width: 100%;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
      box-shadow: 0 4px 16px var(--accent-glow);
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="modal-overlay">
    <div class="modal">
      <div class="game-over-icon"></div>
      <h1 class="title">GAME OVER</h1>
      
      <div class="final-score">
        <div class="final-score-label">Final Score</div>
        <div class="final-score-value">42</div>
        <div class="high-score-note">New High Score! 🎉</div>
      </div>
      
      <button class="btn btn-primary">Play Again</button>
      <button class="btn btn-secondary">Back to Menu</button>
    </div>
  </div>
</body>
</html>
