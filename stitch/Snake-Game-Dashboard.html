<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snake Game Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21c45d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                        "surface-dark": "#1a2f22",
                        "border-dark": "#274532"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .snake-grid {
            background-image: 
                linear-gradient(to right, rgba(39, 69, 50, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(39, 69, 50, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased flex flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-border-dark px-10 py-4 bg-surface-dark/50 backdrop-blur-sm sticky top-0 z-10">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-3xl">sports_esports</span>
<h2 class="text-slate-900 dark:text-white text-xl font-bold font-display tracking-tight">Snake<span class="text-primary">Neon</span></h2>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-dark transition-colors text-slate-900 dark:text-slate-300">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="p-2 rounded-full hover:bg-surface-dark transition-colors text-slate-900 dark:text-slate-300">
<span class="material-symbols-outlined">leaderboard</span>
</button>
<div class="w-10 h-10 rounded-full bg-primary/20 border border-primary/50 overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
</header>
<main class="flex-1 max-w-[1440px] w-full mx-auto p-6 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Left Column: Game Board -->
<div class="lg:col-span-8 xl:col-span-9 flex flex-col gap-6">
<div class="flex justify-between items-end">
<div>
<h1 class="font-display text-4xl font-bold text-slate-900 dark:text-white mb-2">Play Snake</h1>
<p class="text-slate-600 dark:text-slate-400 font-body">Navigate the neon grid, eat the red apples, don't crash.</p>
</div>
<button class="flex items-center gap-2 bg-primary text-background-dark px-6 py-3 rounded-full font-bold font-display hover:bg-primary/90 transition-all shadow-[0_0_15px_rgba(33,196,93,0.3)]">
<span class="material-symbols-outlined">play_arrow</span>
                Start Game
            </button>
</div>
<!-- Game Container -->
<div class="relative w-full aspect-[4/3] bg-[#0a110c] rounded-xl border-2 border-border-dark overflow-hidden shadow-2xl">
<!-- Grid Background -->
<div class="absolute inset-0 snake-grid"></div>
<!-- Mock Snake Elements -->
<div class="absolute w-[40px] h-[40px] bg-red-500 rounded-md top-[160px] left-[320px] shadow-[0_0_15px_rgba(239,68,68,0.8)] animate-pulse"></div>
<!-- Snake Head -->
<div class="absolute w-[40px] h-[40px] bg-primary rounded-md top-[240px] left-[480px] shadow-[0_0_15px_rgba(33,196,93,0.8)] z-10 flex items-center justify-center">
<div class="w-2 h-2 bg-background-dark rounded-full absolute top-2 right-2"></div>
<div class="w-2 h-2 bg-background-dark rounded-full absolute bottom-2 right-2"></div>
</div>
<!-- Snake Body -->
<div class="absolute w-[40px] h-[40px] bg-primary/90 rounded-md top-[240px] left-[440px]"></div>
<div class="absolute w-[40px] h-[40px] bg-primary/80 rounded-md top-[240px] left-[400px]"></div>
<div class="absolute w-[40px] h-[40px] bg-primary/70 rounded-md top-[280px] left-[400px]"></div>
<div class="absolute w-[40px] h-[40px] bg-primary/60 rounded-md top-[320px] left-[400px]"></div>
<div class="absolute w-[40px] h-[40px] bg-primary/50 rounded-md top-[320px] left-[360px]"></div>
<!-- Overlay (for paused/game over state if needed, hidden currently) -->
<div class="absolute inset-0 bg-background-dark/50 hidden items-center justify-center backdrop-blur-sm">
<h2 class="font-display text-5xl font-bold text-white tracking-widest drop-shadow-lg">PAUSED</h2>
</div>
</div>
<!-- Controls Helper -->
<div class="flex justify-center items-center gap-8 py-4 text-slate-600 dark:text-slate-400 font-body text-sm">
<div class="flex items-center gap-2">
<div class="flex gap-1">
<kbd class="px-2 py-1 bg-surface-dark border border-border-dark rounded text-slate-300 font-sans text-xs">W</kbd>
<kbd class="px-2 py-1 bg-surface-dark border border-border-dark rounded text-slate-300 font-sans text-xs">A</kbd>
<kbd class="px-2 py-1 bg-surface-dark border border-border-dark rounded text-slate-300 font-sans text-xs">S</kbd>
<kbd class="px-2 py-1 bg-surface-dark border border-border-dark rounded text-slate-300 font-sans text-xs">D</kbd>
</div>
<span>to move</span>
</div>
<div class="flex items-center gap-2">
<kbd class="px-4 py-1 bg-surface-dark border border-border-dark rounded text-slate-300 font-sans text-xs">Space</kbd>
<span>to pause</span>
</div>
</div>
</div>
<!-- Right Column: Sidebar -->
<div class="lg:col-span-4 xl:col-span-3 flex flex-col gap-6">
<!-- Score Cards -->
<div class="bg-surface-dark border border-border-dark rounded-xl p-6 flex flex-col gap-6">
<div class="flex flex-col gap-2 relative">
<div class="absolute -left-6 top-1/2 -translate-y-1/2 w-1 h-12 bg-primary rounded-r-full"></div>
<p class="text-slate-400 text-sm font-medium uppercase tracking-wider font-display">Current Score</p>
<p class="text-slate-900 dark:text-white font-display text-5xl font-bold leading-none tracking-tight">450</p>
</div>
<div class="h-px w-full bg-border-dark"></div>
<div class="flex flex-col gap-2">
<p class="text-slate-400 text-sm font-medium uppercase tracking-wider font-display">High Score</p>
<div class="flex items-end gap-3">
<p class="text-slate-900 dark:text-slate-300 font-display text-3xl font-bold leading-none tracking-tight">1,240</p>
<span class="material-symbols-outlined text-yellow-500 text-xl mb-0.5">trophy</span>
</div>
</div>
</div>
<!-- Difficulty Selector -->
<div class="bg-surface-dark border border-border-dark rounded-xl p-6 flex flex-col gap-4">
<h3 class="font-display font-bold text-lg text-slate-900 dark:text-white">Difficulty</h3>
<div class="flex flex-col gap-3">
<label class="group relative flex cursor-pointer items-center justify-between rounded-lg border border-border-dark bg-background-dark/50 p-4 hover:border-primary/50 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-5 h-5 rounded-full border border-slate-500 group-has-[:checked]:border-primary group-has-[:checked]:bg-primary/20 relative">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 group-has-[:checked]:opacity-100 transition-opacity"></div>
</div>
<span class="font-medium text-slate-300 group-has-[:checked]:text-primary font-display">Easy</span>
</div>
<span class="text-xs text-slate-500 font-body">Slow speed</span>
<input class="invisible absolute" name="difficulty" type="radio" value="easy"/>
</label>
<label class="group relative flex cursor-pointer items-center justify-between rounded-lg border border-border-dark bg-background-dark/50 p-4 hover:border-primary/50 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-5 h-5 rounded-full border border-slate-500 group-has-[:checked]:border-primary group-has-[:checked]:bg-primary/20 relative">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 group-has-[:checked]:opacity-100 transition-opacity"></div>
</div>
<span class="font-medium text-slate-300 group-has-[:checked]:text-primary font-display">Medium</span>
</div>
<span class="text-xs text-slate-500 font-body">Normal speed</span>
<input checked="" class="invisible absolute" name="difficulty" type="radio" value="medium"/>
</label>
<label class="group relative flex cursor-pointer items-center justify-between rounded-lg border border-border-dark bg-background-dark/50 p-4 hover:border-primary/50 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-5 h-5 rounded-full border border-slate-500 group-has-[:checked]:border-primary group-has-[:checked]:bg-primary/20 relative">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 group-has-[:checked]:opacity-100 transition-opacity"></div>
</div>
<span class="font-medium text-slate-300 group-has-[:checked]:text-primary font-display">Expert</span>
</div>
<span class="text-xs text-slate-500 font-body">Fast speed</span>
<input class="invisible absolute" name="difficulty" type="radio" value="expert"/>
</label>
</div>
</div>
<!-- Recent Matches (Optional contextual fill) -->
<div class="bg-surface-dark border border-border-dark rounded-xl p-6 flex flex-col gap-4">
<div class="flex justify-between items-center">
<h3 class="font-display font-bold text-lg text-slate-900 dark:text-white">Recent Games</h3>
<button class="text-primary text-sm font-medium hover:underline">View All</button>
</div>
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center py-2 border-b border-border-dark">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500 text-sm">schedule</span>
<span class="text-slate-300 text-sm font-body">Today, 14:23</span>
</div>
<span class="text-white font-display font-bold">890</span>
</div>
<div class="flex justify-between items-center py-2 border-b border-border-dark">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500 text-sm">schedule</span>
<span class="text-slate-300 text-sm font-body">Today, 12:05</span>
</div>
<span class="text-white font-display font-bold">420</span>
</div>
<div class="flex justify-between items-center py-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500 text-sm">schedule</span>
<span class="text-slate-300 text-sm font-body">Yesterday</span>
</div>
<span class="text-white font-display font-bold">1,150</span>
</div>
</div>
</div>
</div>
</main>
</body></html>
